name: Build OpenClaw Deploy Tool

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: pip install pyinstaller requests

    - name: Build with PyInstaller
      run: pyinstaller --onefile --name "OpenClaw-部署工具" deploy_client.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: OpenClaw-${{ matrix.os }}
        path: dist/OpenClaw-部署工具*

