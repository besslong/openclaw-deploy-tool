name: Build OpenClaw Deploy Tool

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: OpenClaw-部署工具-linux
          - os: windows-latest
            artifact_name: OpenClaw-部署工具.exe
          - os: macos-latest
            artifact_name: OpenClaw-部署工具-mac

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install pyinstaller requests

    - name: Build with PyInstaller
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          pyinstaller --onefile --name "OpenClaw-部署工具" deploy_client.py
        else
          pyinstaller --onefile --name "OpenClaw-部署工具" deploy_client.py
          chmod +x dist/OpenClaw-部署工具
        fi
      shell: bash

    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: ${{ matrix.artifact_name }}
        path: dist/OpenClaw-部署工具*
        retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v3
      with:
        path: artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/OpenClaw-部署工具-linux/OpenClaw-部署工具
          artifacts/OpenClaw-部署工具.exe/OpenClaw-部署工具.exe
          artifacts/OpenClaw-部署工具-mac/OpenClaw-部署工具
        generate_release_notes: true