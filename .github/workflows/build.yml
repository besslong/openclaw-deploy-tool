name: Build OpenClaw Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Set up Node.js (for downloading OpenClaw)
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Download offline packages
      shell: bash
      run: |
        echo "📦 下载离线安装包..."
        mkdir -p bundle
        
        # 1. 下载 Node.js (ZIP 版本)
        echo "⬇️  下载 Node.js v22.14.0..."
        curl -L -o nodejs.zip "https://npmmirror.com/mirrors/node/v22.14.0/node-v22.14.0-win-x64.zip"
        unzip -q nodejs.zip
        mv node-v22.14.0-win-x64 bundle/nodejs
        rm -f nodejs.zip
        echo "✅ Node.js 下载完成"
        
        # 2. 下载 Git (便携版)
        echo "⬇️  下载 Git..."
        curl -L -o git.7z.exe "https://npmmirror.com/mirrors/git-for-windows/v2.49.0.windows.1/PortableGit-2.49.0-64-bit.7z.exe"
        7z x git.7z.exe -obundle/git -y
        rm -f git.7z.exe
        echo "✅ Git 下载完成"
        
        # 3. 下载 OpenClaw
        echo "⬇️  下载 OpenClaw..."
        npm pack openclaw --registry https://registry.npmmirror.com
        tar -xzf openclaw-*.tgz
        mv package bundle/openclaw
        rm -f openclaw-*.tgz
        echo "✅ OpenClaw 下载完成"
        
        echo ""
        echo "📊 离线包大小："
        du -sh bundle/*

    - name: Install Python dependencies
      run: pip install pyinstaller requests
      shell: bash

    - name: Build with PyInstaller (include bundle)
      run: |
        pyinstaller --onefile --windowed --icon=openclaw_logo.ico --name "OpenClaw-Installer" --add-data "bundle;bundle" installer.py
      shell: bash

    - name: Check installer size
      shell: bash
      run: |
        echo "📦 最终安装包大小："
        ls -lh dist/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: OpenClaw-Installer
        path: dist/OpenClaw-Installer.exe
        retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/OpenClaw-Installer/OpenClaw-Installer.exe
        generate_release_notes: true