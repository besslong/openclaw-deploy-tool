name: Build OpenClaw Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: 诊断网络
      run: |
        echo "=== 网络诊断 ==="
        curl -I --connect-timeout 10 https://github.com || echo "GitHub 连接失败"
        curl -I --connect-timeout 10 https://npmmirror.com || echo "淘宝镜像连接失败"
        nslookup github.com || echo "DNS 解析失败"
      shell: bash

    - name: 配置网络兼容性
      run: |
        git config --global http.sslVerify false
        git config --global http.postBuffer 524288000
        npm config set strict-ssl false
        npm config set registry https://registry.npmmirror.com
        npm config set sharp_binary_host https://npmmirror.com/mirrors/sharp
        npm config set sharp_libvips_binary_host https://npmmirror.com/mirrors/sharp-libvips
      shell: bash

    - name: 使用国内镜像源加速
      run: |
        git config --global url."https://ghproxy.com/https://github.com/".insteadOf https://github.com/
        git config --global url."https://ghproxy.com/https://raw.githubusercontent.com/".insteadOf https://raw.githubusercontent.com/
      shell: bash

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        for i in {1..3}; do
          echo "尝试安装依赖 ($i/3)..."
          pip install -i https://pypi.tuna.tsinghua.edu.cn/simple pyinstaller requests && break || sleep 5
        done
      shell: bash

    - name: Build with PyInstaller
      run: |
        for i in {1..3}; do
          echo "尝试打包 ($i/3)..."
          pyinstaller --onefile --windowed --name "OpenClaw 一键部署工具" installer.py && break || sleep 5
        done
      shell: bash

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: OpenClaw-一键部署工具
        path: dist/OpenClaw 一键部署工具.exe
        retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          artifacts/OpenClaw-一键部署工具/OpenClaw 一键部署工具.exe
        generate_release_notes: true